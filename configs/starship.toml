format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
read_only = " п Ѕ"
style = "white"

[character]
success_symbol = "вќЇ"
error_symbol = "вќЇ"

[battery]
full_symbol = "вЂў"
charging_symbol = "в‡Ў"
discharging_symbol = "в‡Ј"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](bright-black) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "вЂ‹"
untracked = "вЂ‹"
modified = "вЂ‹"
staged = "вЂ‹"
renamed = "вЂ‹"
deleted = "вЂ‹"
stashed = "в‰Ў"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"


