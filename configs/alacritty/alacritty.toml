[font]
size = 12
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }
builtin_box_drawing = true

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono Bold"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono Italic"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font Mono Bold Italic"
style = "Bold Italic"
